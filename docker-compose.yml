# Postgres service for diesel-dualdb's test suite.
#
# This is the "bring your own Postgres" container the angreal test tasks
# (.angreal/task_test.py) bring up, point the suite at via DUALDB_PG_URL, and
# tear down. SQLite tests run in-memory and need nothing here.
#
# Port 55432 (not 5432) is deliberate: it avoids clashing with any Postgres
# already running on the host.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dualdb
      POSTGRES_PASSWORD: dualdb
      POSTGRES_DB: dualdb_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dualdb -d dualdb_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    # Ephemeral by design — no named volume; `down` wipes the data.
    tmpfs:
      - /var/lib/postgresql/data
